services:
  banco:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: minhaapi
    ports:
      - "5432:5432"
    volumes:
      - dados_postgres:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:1234@banco:5432/minhaapi
      JWT_SECRET: minha_chave_secreta_super_segura
    depends_on:
      - banco

volumes:
  dados_postgres: